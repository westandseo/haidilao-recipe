<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하이디라오 꿀팁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=36">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E0301E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="하이디라오 꿀팁">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="ptr-indicator" id="ptrIndicator">
  <span class="ptr-emoji ptr-emoji--veg" style="--ptr-rot:-39deg; --ptr-dx:-85px; --ptr-dy:-15px">🌶️</span>
  <span class="ptr-emoji ptr-emoji--big" style="--ptr-rot:25deg; --ptr-dx:-20px; --ptr-dy:-32px">🍲</span>
  <span class="ptr-emoji ptr-emoji--veg" style="--ptr-rot:-14deg; --ptr-dx:20px; --ptr-dy:-32px">🧄</span>
  <span class="ptr-emoji ptr-emoji--big" style="--ptr-rot:36deg; --ptr-dx:85px; --ptr-dy:-15px">🥟</span>
  <span class="ptr-emoji ptr-emoji--veg" style="--ptr-rot:-34deg; --ptr-dx:100px; --ptr-dy:30px">🧅</span>
  <span class="ptr-emoji ptr-emoji--big" style="--ptr-rot:20deg; --ptr-dx:25px; --ptr-dy:32px">🥢</span>
  <span class="ptr-emoji ptr-emoji--veg" style="--ptr-rot:-22deg; --ptr-dx:-25px; --ptr-dy:32px">🥬</span>
  <span class="ptr-emoji ptr-emoji--big" style="--ptr-rot:31deg; --ptr-dx:-100px; --ptr-dy:30px">🍜</span>
  <span class="ptr-emoji ptr-emoji--spark" style="--ptr-rot:10deg; --ptr-dx:-35px; --ptr-dy:-48px; --ptr-dx-b:-70px; --ptr-dy-b:-95px">✨</span>
  <span class="ptr-emoji ptr-emoji--spark" style="--ptr-rot:-15deg; --ptr-dx:100px; --ptr-dy:-35px; --ptr-dx-b:150px; --ptr-dy-b:-65px">✨</span>
  <span class="ptr-emoji ptr-emoji--spark" style="--ptr-rot:20deg; --ptr-dx:45px; --ptr-dy:50px; --ptr-dx-b:85px; --ptr-dy-b:90px">✨</span>
  <span class="ptr-emoji ptr-emoji--spark" style="--ptr-rot:-10deg; --ptr-dx:-115px; --ptr-dy:50px; --ptr-dx-b:-160px; --ptr-dy-b:85px">✨</span>
  <span class="ptr-text" id="ptrText"><span class="ptr-label">땡겨요</span><span class="ptr-suffix" id="ptrSuffix">하딜</span><span class="ptr-dots" id="ptrDots"></span></span>
</div>

<div class="page">

  <!-- HERO -->
  <header class="hero">
    <div class="hero-inner">
      <img class="hero-mascot" src="assets/mascot.png" alt="하이디라오 마스코트">
      <h1 class="hero-title"><img class="hero-badge" src="assets/hi-logo.png" alt="">하이디라오 꿀팁</h1>
      <p class="hero-subtitle">하이디라오 갈 때마다<br class="mobile-break"> 사진첩 뒤지기 귀찮아서 만든 레시피 모음</p>
    </div>
  </header>

  <!-- CATEGORY TABS + SEARCH -->
  <div class="tabs-bar">
    <div class="search-box">
      <span class="search-icon" id="searchIcon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <input class="search-input" id="searchInput" type="text" placeholder="검색">
      <button class="search-clear" id="searchClear" type="button" aria-label="검색어 지우기">&times;</button>
    </div>
    <div class="tabs" id="tabs">
      <span class="tabs-underline" id="tabsUnderline"></span>
    </div>
  </div>

  <!-- RECIPE GRID -->
  <main class="main">
    <p class="count-line">레시피 <span class="count-num" id="countNum">0</span>개</p>
    <div class="recipe-grid" id="recipeGrid"></div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <img class="footer-watermark" src="assets/footer-watermark.png" alt="">
    <span class="footer-title">하이디라오 꿀팁</span>
  </footer>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="recipe-modal-scroll">
    <div class="modal-header">
      <span class="modal-close" id="modalClose">&times;</span>
      <span class="modal-cat" id="modalCat"></span>
      <h2 class="modal-name" id="modalName"></h2>
      <p class="modal-desc" id="modalDesc"></p>
    </div>
    <div class="modal-body">
      <div id="modalOrderWrap">
        <h3 class="modal-section-title">📋 주문</h3>
        <div class="ing-box" id="modalOrder"></div>
      </div>
      <div>
        <h3 class="modal-section-title">🥣 소스바</h3>
        <div class="ing-box" id="modalIngs"></div>
      </div>
      <div id="modalStepsWrap">
        <h3 class="modal-section-title">👩‍🍳 만드는 법</h3>
        <div class="steps-list" id="modalSteps"></div>
      </div>
      <div id="modalTipWrap">
        <h3 class="modal-section-title">💡 나만의 팁</h3>
        <div class="tip-box" id="modalTip"></div>
      </div>
    </div>
  </div>
</div>

<!-- IN-APP BROWSER GUIDE -->
<div class="inapp-banner" id="inappBanner" style="display:none;">
  <span class="inapp-banner-text" id="inappBannerText"></span>
  <span class="inapp-banner-close" id="inappBannerClose">&times;</span>
</div>

<!-- FLOATING ACTIONS -->
<div class="floating-actions" id="floatingActions">
  <button class="a2hs-btn" id="androidInstallBtn" type="button" style="display:none;">
    <span class="a2hs-btn-icon">＋</span>앱 설치하기
  </button>
  <button class="a2hs-btn" id="a2hsBtn" type="button" style="display:none;">
    <span class="a2hs-btn-icon">＋</span>홈 화면에 추가
  </button>
  <button class="share-btn" id="shareBtn" type="button">
    <span class="share-btn-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
        <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/>
        <path d="M8.6 10.6l6.8-3.8M8.6 13.4l6.8 3.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </span>친구에게 공유
  </button>
</div>
<div class="share-toast" id="shareToast">링크가 복사되었어요!</div>

<div class="a2hs-overlay" id="a2hsOverlay">
  <div class="a2hs-card">
    <span class="a2hs-close" id="a2hsClose">&times;</span>
    <img class="a2hs-icon" src="assets/apple-touch-icon.png" alt="">
    <h3 class="a2hs-title">홈 화면에 추가하고<br>앱처럼 편하게 열어보세요</h3>
    <ol class="a2hs-steps">
      <li>
        <span class="a2hs-step-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7 8l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="a2hs-step-text">하단(또는 상단) 공유 버튼을 눌러요</span>
      </li>
      <li>
        <span class="a2hs-step-icon">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5" stroke="currentColor" stroke-width="1.6"/>
            <path d="M12 8.5v7M8.5 12h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="a2hs-step-text">목록에서 <b>'홈 화면에 추가'</b>를 선택해요</span>
      </li>
      <li><span class="a2hs-step-icon">✓</span><span class="a2hs-step-text">오른쪽 위 <b>'추가'</b>를 누르면 완료!</span></li>
    </ol>
  </div>
</div>

<script src="script.js?v=23"></script>
</body>
</html>
