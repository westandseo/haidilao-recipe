  /* 스플래시(로고 인트로) — 외부 CSS보다 먼저 떠야 하므로 인라인 */
  .splash {
    position: fixed; inset: 0; z-index: 9999;
    background: #F4E9E0;
    display: flex; align-items: center; justify-content: center;
    box-sizing: border-box; padding-bottom: 6vh; /* 블록을 살짝 위로 (아래 쏠림 보정) */
    opacity: 1; transition: opacity .4s ease;
  }
  .splash-hide { opacity: 0; pointer-events: none; }
  /* 로고+제목을 한 덩어리로 함께 등장시켜 시간차 방지 */
  .splash-inner {
    display: flex; flex-direction: column; align-items: center; gap: 0;
    animation: splashPop .5s cubic-bezier(.2,.8,.2,1) both;
  }
  .splash-logo { width: 140px; height: 140px; object-fit: contain; }
  .splash-title {
    font-family: 'PaperlogySplash', 'Noto Sans KR', sans-serif;
    font-weight: 500; font-size: 26px; color: #E0301E;
    letter-spacing: -.01em;
    /* 로고 PNG 아래 투명여백(약 23px) 상쇄해 트레이 바로 밑에 붙임 */
    line-height: 1; margin-top: -16px;
  }
  @keyframes splashPop { from { opacity: 0; transform: scale(.86); } to { opacity: 1; transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) { .splash-inner { animation: none; } }
</style>

<!-- 스플래시(로고 인트로) — 콜드 스타트 때만, 세션당 1회 -->

<script>
(function () {
  var s = document.getElementById('splash');
  if (!s) return;
  // 이미 이번 세션에 봤으면(새로고침·로고클릭 등) 즉시 제거 — 깜빡임 없음
  if (sessionStorage.getItem('hg_splash')) { s.parentNode.removeChild(s); return; }
  sessionStorage.setItem('hg_splash', '1');
  var MIN = 1100, start = Date.now(), done = false;
  function hide() {
    if (done) return; done = true;
    s.classList.add('splash-hide');
    setTimeout(function () { if (s.parentNode) s.parentNode.removeChild(s); }, 420);
  }
  function schedule() { setTimeout(hide, Math.max(0, MIN - (Date.now() - start))); }
  if (document.readyState === 'complete') schedule();
  else window.addEventListener('load', schedule);
  setTimeout(hide, 2200); // 로딩이 길어도 여기서 강제 종료
})();
</script>

    <!-- 이름 행(이름+별, 연도가 뒤따름) — 모바일에선 썸네일(아트 창)보다 위 -->
    <div class="modal-header">
      <button class="modal-fav-btn" id="modalFavBtn" type="button" aria-label="즐겨찾기">
        <svg width="19" height="19" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="modal-close" id="modalClose">&times;</span>
      <h2 class="modal-name" id="modalName"></h2>
      <span class="modal-ver" id="modalVer"></span>
    </div>
    <!-- 원본 썸네일(모바일 전용) — 프레임 안의 "아트 창" -->
    <div class="modal-thumb" id="modalThumb"></div>
    <!-- 설명 — 모바일: 아트 창 바로 아래 테두리 박스(TCG 플레이버 텍스트) -->
    <p class="modal-desc" id="modalDesc"></p>
    <div class="modal-body">
      <div id="modalOrderWrap">
        <h3 class="modal-section-title">📋 주문</h3>
        <div class="ing-box" id="modalOrder"></div>
      </div>
      <div id="modalIngsWrap">
        <h3 class="modal-section-title">🥣 소스바</h3>
        <div class="ing-box" id="modalIngs"></div>
      </div>
      <div id="modalStepsWrap">
        <h3 class="modal-section-title">👩‍🍳 만드는 법</h3>
        <div class="steps-list" id="modalSteps"></div>
      </div>
      <div id="modalTipWrap">
        <h3 class="modal-section-title">💡 나만의 팁</h3>
        <div class="tip-box" id="modalTip"></div>
      </div>
      <div class="modal-like-wrap">
        <button class="modal-like-btn" id="modalLikeBtn" type="button" aria-label="좋아요">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span class="like-count" id="modalLikeCount">0</span>
        </button>
      </div>
    </div>
    </div>
  </div>
</div>

<!-- IN-APP BROWSER GUIDE -->
<div class="inapp-banner" id="inappBanner" style="display:none;">
  <span class="inapp-banner-text" id="inappBannerText"></span>
