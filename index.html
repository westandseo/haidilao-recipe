<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하딜고고</title>
<meta name="description" content="하이디라오(훠궈) 소스·레시피 꿀팁 모음">
<meta property="og:type" content="website">
<meta property="og:title" content="하딜고고 — 하이디라오 꿀팁">
<meta property="og:description" content="하이디라오(훠궈) 소스·레시피 꿀팁 모음">
<meta property="og:image" content="https://haidilgogo.github.io/assets/og-image.png?v=2">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://haidilgogo.github.io/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=106">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png?v=2">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=2">
<link rel="manifest" href="manifest.json?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="하딜고고">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-inner">
      <button class="topbar-brand" id="homeBtn" type="button">
        <img class="topbar-logo-mark" src="assets/logo-mark.png" alt="" draggable="false">
        <span class="topbar-title">하딜고고</span>
      </button>
      <div class="tabs-group">
        <div class="tabs" id="tabs">
          <span class="tabs-underline" id="tabsUnderline"></span>
        </div>
        <button class="fav-toggle-btn" id="favToggleBtn" type="button" aria-label="즐겨찾기">
          <svg class="fav-toggle-icon" id="favToggleIcon" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
          <span class="fav-toggle-label">즐겨찾기</span>
        </button>
      </div>
      <div class="topbar-spacer"></div>
      <div class="search-box">
        <span class="search-icon" id="searchIcon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <input class="search-input" id="searchInput" type="text" placeholder="검색">
        <button class="search-clear" id="searchClear" type="button" aria-label="검색어 지우기">&times;</button>
      </div>
      <button class="topbar-icon-btn" id="topShareBtn" type="button" aria-label="친구에게 공유">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
          <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M8.6 10.6l6.8-3.8M8.6 13.4l6.8 3.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="topbar-icon-btn" id="topInstallBtn" type="button" aria-label="앱 설치하기" style="display:none;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 11l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 18v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- RECIPE GRID -->
  <main class="main">
    <div class="list-head">
      <p class="count-line">레시피 <span class="count-num" id="countNum">0</span>개</p>
      <div class="head-actions">
        <button class="gacha-btn" id="gachaBtn" type="button">🎲 오늘의 소스</button>
        <div class="sort-dd" id="sortDd">
          <button class="sort-dd-btn" id="sortDdBtn" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="정렬 방식">
            <span class="sort-dd-current" id="sortDdCurrent">♥️ 인기순</span>
            <svg class="sort-dd-chev" width="11" height="11" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="sort-dd-menu" id="sortDdMenu" role="listbox">
            <button class="sort-dd-item active" type="button" role="option" data-sort="popular">♥️ 인기순</button>
            <button class="sort-dd-item" type="button" role="option" data-sort="recent">🕐 최신순</button>
            <button class="sort-dd-item" type="button" role="option" data-sort="name">🔤 가나다순</button>
          </div>
        </div>
      </div>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-title">하딜고고는 하이디라오 소스바 앞에서 매번 건희소스를 <br class="footer-break-mobile">검색하는 사람들(나 포함)을 위해 만들어졌습니다</span>
  </footer>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="recipe-modal-scroll">
    <div class="modal-header">
      <button class="modal-fav-btn" id="modalFavBtn" type="button" aria-label="즐겨찾기">
        <svg width="19" height="19" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="modal-close" id="modalClose">&times;</span>
      <span class="modal-cat" id="modalCat"></span>
      <h2 class="modal-name" id="modalName"></h2>
      <p class="modal-desc" id="modalDesc"></p>
    </div>
    <div class="modal-body">
      <div id="modalOrderWrap">
        <h3 class="modal-section-title">📋 주문</h3>
        <div class="ing-box" id="modalOrder"></div>
      </div>
      <div>
        <h3 class="modal-section-title">🥣 소스바</h3>
        <div class="ing-box" id="modalIngs"></div>
      </div>
      <div id="modalStepsWrap">
        <h3 class="modal-section-title">👩‍🍳 만드는 법</h3>
        <div class="steps-list" id="modalSteps"></div>
      </div>
      <div id="modalTipWrap">
        <h3 class="modal-section-title">💡 나만의 팁</h3>
        <div class="tip-box" id="modalTip"></div>
      </div>
    </div>
  </div>
</div>

<!-- IN-APP BROWSER GUIDE -->
<div class="inapp-banner" id="inappBanner" style="display:none;">
  <span class="inapp-banner-text" id="inappBannerText"></span>
  <span class="inapp-banner-close" id="inappBannerClose">&times;</span>
</div>

<!-- FLOATING ACTIONS -->
<div class="floating-actions" id="floatingActions">
  <button class="a2hs-btn" id="androidInstallBtn" type="button" style="display:none;">
    <span class="a2hs-btn-icon">＋</span>앱 설치하기
  </button>
  <button class="a2hs-btn" id="a2hsBtn" type="button" style="display:none;">
    <span class="a2hs-btn-icon">＋</span>홈 화면에 추가
  </button>
  <button class="share-btn" id="shareBtn" type="button">
    <span class="share-btn-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
        <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/>
        <path d="M8.6 10.6l6.8-3.8M8.6 13.4l6.8 3.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </span>친구에게 공유
  </button>
</div>
<div class="share-toast" id="shareToast">링크가 복사되었어요!</div>

<div class="a2hs-overlay" id="a2hsOverlay">
  <div class="a2hs-card">
    <span class="a2hs-close" id="a2hsClose">&times;</span>
    <img class="a2hs-icon" src="assets/apple-touch-icon.png" alt="">
    <h3 class="a2hs-title">홈 화면에 추가하고<br>앱처럼 편하게 열어보세요</h3>
    <ol class="a2hs-steps">
      <li>
        <span class="a2hs-step-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7 8l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="a2hs-step-text">하단(또는 상단) 공유 버튼을 눌러요</span>
      </li>
      <li>
        <span class="a2hs-step-icon">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5" stroke="currentColor" stroke-width="1.6"/>
            <path d="M12 8.5v7M8.5 12h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="a2hs-step-text">목록에서 <b>'홈 화면에 추가'</b>를 선택해요</span>
      </li>
      <li><span class="a2hs-step-icon">✓</span><span class="a2hs-step-text">오른쪽 위 <b>'추가'</b>를 누르면 완료!</span></li>
    </ol>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<!-- 오늘의 소스 가챠 -->
<div class="gacha-overlay" id="gachaOverlay">
  <div class="gacha-modal" id="gachaModal">
    <button class="modal-close gacha-close" id="gachaClose" type="button" aria-label="닫기">&times;</button>
    <div class="gacha-title">오늘의 소스</div>
    <div class="gacha-stage" id="gachaStage">
      <!-- 받침 매트: 크림색 그릇이 배경에 묻히지 않게 우드톤 매트를 깔아 대비 확보 -->
      <svg class="gacha-mat" id="gachaMat" viewBox="0 0 190 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="gMat" cx="50%" cy="42%" r="62%">
            <stop offset="0%" stop-color="#C99A63"/>
            <stop offset="70%" stop-color="#A97C48"/>
            <stop offset="100%" stop-color="#8F6438"/>
          </radialGradient>
        </defs>
        <ellipse cx="95" cy="22" rx="93" ry="20" fill="url(#gMat)"/>
        <ellipse cx="95" cy="22" rx="93" ry="20" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
        <ellipse cx="95" cy="22" rx="78" ry="16" fill="none" stroke="rgba(90,55,25,.25)" stroke-width="1.2"/>
        <ellipse cx="95" cy="21" rx="60" ry="12" fill="none" stroke="rgba(90,55,25,.18)" stroke-width="1"/>
      </svg>
      <div class="gacha-bowl" id="gachaBowl">
        <!-- 소스그릇: 블러/그림자 필터 없이 SVG 그라데이션만 사용(iOS 렌더링 문제 회피) -->
        <svg class="gacha-bowl-shadow" id="gachaBowlShadow" viewBox="0 0 150 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="gBowlShadow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(95,48,24,.5)"/>
              <stop offset="55%" stop-color="rgba(95,48,24,.25)"/>
              <stop offset="100%" stop-color="rgba(95,48,24,0)"/>
            </radialGradient>
          </defs>
          <ellipse cx="75" cy="15" rx="46" ry="8" fill="url(#gBowlShadow)"/>
        </svg>
        <svg class="gacha-bowl-back" viewBox="0 0 150 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="gBowlRimTop" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FFFEFA"/>
              <stop offset="100%" stop-color="#E9DCC4"/>
            </linearGradient>
            <linearGradient id="gBowlInner" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#BCA277"/>
              <stop offset="45%" stop-color="#D9C6A4"/>
              <stop offset="100%" stop-color="#F3EAD6"/>
            </linearGradient>
          </defs>
          <ellipse cx="75" cy="30" rx="65" ry="18" fill="url(#gBowlRimTop)"/>
          <ellipse cx="75" cy="30" rx="61" ry="16.5" fill="none" stroke="#C0392B" stroke-width="1.8"/>
          <ellipse cx="75" cy="31" rx="57" ry="15" fill="url(#gBowlInner)"/>
        </svg>
        <svg class="gacha-sauce" id="gachaSauce" viewBox="0 0 150 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="gSauceBody" cx="44%" cy="34%" r="78%">
              <stop offset="0%" stop-color="#F06A3C"/>
              <stop offset="55%" stop-color="#C23517"/>
              <stop offset="100%" stop-color="#8E2410"/>
            </radialGradient>
            <radialGradient id="gSauceBeige" cx="44%" cy="34%" r="78%">
              <stop offset="0%" stop-color="#F2DDAE"/>
              <stop offset="55%" stop-color="#D8AE6C"/>
              <stop offset="100%" stop-color="#B07F42"/>
            </radialGradient>
          </defs>
          <ellipse cx="75" cy="31" rx="50" ry="12" fill="url(#gSauceBody)"/>
          <ellipse class="sauce-beige" id="gachaSauceBeige" cx="75" cy="31" rx="50" ry="12" fill="url(#gSauceBeige)"/>
          <ellipse cx="75" cy="31" rx="50" ry="12" fill="none" stroke="rgba(96,22,8,.4)" stroke-width="1.2"/>
          <ellipse cx="59" cy="27" rx="15" ry="3.6" fill="rgba(255,255,255,.32)"/>
          <ellipse cx="87" cy="30.5" rx="8" ry="2.4" fill="rgba(255,190,120,.4)"/>
          <ellipse cx="93" cy="32" rx="3" ry="1.2" fill="rgba(255,210,150,.45)"/>
          <ellipse cx="88" cy="33" rx="2.1" ry="1.2" fill="#F4E7C8" transform="rotate(24 88 33)"/>
          <ellipse cx="66" cy="34" rx="2.1" ry="1.2" fill="#F0E2BE" transform="rotate(-18 66 34)"/>
          <ellipse cx="79" cy="28.5" rx="1.9" ry="1.1" fill="#F7ECD2" transform="rotate(50 79 28.5)"/>
          <circle cx="94" cy="29" r="1.3" fill="#7E1F0C"/>
          <circle cx="58" cy="33.5" r="1.2" fill="#8A230D"/>
        </svg>
        <div class="gacha-ings" id="gachaIngs"></div>
        <svg class="gacha-bowl-front" viewBox="0 0 150 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="gBowlBody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FFFDF7"/>
              <stop offset="55%" stop-color="#F3E9D6"/>
              <stop offset="100%" stop-color="#CDB48D"/>
            </linearGradient>
            <radialGradient id="gBowlSheen" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(255,255,255,.5)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </radialGradient>
          </defs>
          <path d="M10 30 A65 18 0 0 0 140 30 C138 58 112 82 75 82 C38 82 12 58 10 30 Z" fill="url(#gBowlBody)"/>
          <ellipse cx="50" cy="50" rx="24" ry="12" fill="url(#gBowlSheen)"/>
          <ellipse cx="75" cy="72" rx="28" ry="6" fill="rgba(255,255,255,.22)"/>
          <path d="M10 30 A65 18 0 0 0 140 30" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="gacha-result" id="gachaResult"></div>
    </div>
    <button class="gacha-pull" id="gachaPull" type="button">뽑기</button>
    <div class="gacha-actions" id="gachaActions">
      <button class="gacha-view" id="gachaView" type="button">📖 레시피 보기</button>
      <button class="gacha-again" id="gachaAgain" type="button">🎲 다시 뽑기</button>
    </div>
  </div>
</div>

<script src="script.js?v=56"></script>
</body>
</html>
